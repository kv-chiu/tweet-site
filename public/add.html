<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Tweet</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: system-ui, sans-serif; background: #16171d; color: #f3f4f6;
  }
  .card {
    text-align: center; padding: 40px; border-radius: 16px;
    background: #1f2028; border: 1px solid #2e303a; max-width: 400px; width: 90%;
  }
  .status { font-size: 18px; margin-bottom: 8px; }
  .detail { font-size: 14px; color: #9ca3af; word-break: break-all; }
  .success .status { color: #22c55e; }
  .error .status { color: #ef4444; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #2e303a; border-top-color: #c084fc;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Adding tweet...</div>
  <div class="detail" id="detail"></div>
</div>
<script>
(async () => {
  const card = document.getElementById('card');
  const spinner = document.getElementById('spinner');
  const status = document.getElementById('status');
  const detail = document.getElementById('detail');

  const params = new URLSearchParams(location.search);
  const tweet = params.get('tweet');
  const secret = params.get('secret');

  if (!tweet || !secret) {
    spinner.remove();
    card.className = 'card error';
    status.textContent = 'Missing parameters';
    detail.textContent = 'Usage: ?tweet=URL&secret=YOUR_SECRET';
    return;
  }

  detail.textContent = tweet;

  try {
    const res = await fetch('/api/add-tweet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret, tweet }),
    });
    const data = await res.json();
    spinner.remove();

    if (data.error) {
      card.className = 'card error';
      status.textContent = data.error;
    } else {
      card.className = 'card success';
      status.textContent = data.message + ' ' + data.tweetId;
    }
  } catch (e) {
    spinner.remove();
    card.className = 'card error';
    status.textContent = 'Request failed';
    detail.textContent = e.message;
  }

  // Auto close after 2s
  setTimeout(() => window.close(), 2000);
})();
</script>
</body>
</html>
